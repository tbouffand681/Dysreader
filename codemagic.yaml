workflows:

  # ── Build DEBUG (Pull Requests / branches de dev) ──────────────────────────
  # Pas de keystore déclaré : Gradle utilise le debug.keystore auto-généré par Android SDK
  android-debug:
    name: Android Debug Build
    max_build_duration: 30
    instance_type: mac_mini_m1

    environment:
      vars:
        PACKAGE_NAME: "com.dyslexiread.app"
      java: 17

    triggering:
      events:
        - push
        - pull_request
      branch_patterns:
        - pattern: 'develop'
          include: true
        - pattern: 'feature/*'
          include: true
        - pattern: 'main'
          include: false

    scripts:
      - name: Vérifier la structure du projet
        script: |
          ls -la
          cat gradle/libs.versions.toml | grep "kotlin ="

      - name: Set up local.properties
        script: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties

      - name: Télécharger les dépendances Gradle
        script: |
          ./gradlew dependencies --no-daemon

      - name: Lint
        script: |
          ./gradlew lint --no-daemon
        ignore_failure: true

      - name: Tests unitaires
        script: |
          ./gradlew test --no-daemon
        ignore_failure: true

      - name: Assembler APK Debug
        script: |
          ./gradlew assembleDebug --no-daemon

    artifacts:
      - app/build/outputs/apk/debug/*.apk
      - app/build/reports/lint-results-debug.html

    publishing:
      email:
        recipients:
          - dev@dyslexiread.com
        notify:
          success: true
          failure: true

  # ── Build RELEASE (tag Git → Play Store internal track) ───────────────────
  # Signature via variables d'environnement Codemagic (secrets) :
  #   CM_KEYSTORE          : keystore encodé en base64
  #   CM_KEY_ALIAS         : alias de la clé
  #   CM_KEY_PASSWORD      : mot de passe de la clé
  #   CM_KEYSTORE_PASSWORD : mot de passe du keystore
  android-release:
    name: Android Release — Play Store
    max_build_duration: 60
    instance_type: mac_mini_m1

    environment:
      vars:
        PACKAGE_NAME: "com.dyslexiread.app"
      java: 17

    triggering:
      events:
        - tag
      tag_patterns:
        - pattern: 'v*'
          include: true

    scripts:
      - name: Set up local.properties
        script: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties

      - name: Configurer la signature
        script: |
          echo $CM_KEYSTORE | base64 --decode > /tmp/dyslexiread.jks
          cat >> gradle.properties <<EOF
          RELEASE_STORE_FILE=/tmp/dyslexiread.jks
          RELEASE_KEY_ALIAS=$CM_KEY_ALIAS
          RELEASE_KEY_PASSWORD=$CM_KEY_PASSWORD
          RELEASE_STORE_PASSWORD=$CM_KEYSTORE_PASSWORD
          EOF

      - name: Lint
        script: |
          ./gradlew lint --no-daemon

      - name: Tests unitaires
        script: |
          ./gradlew test --no-daemon

      - name: Assembler APK Release signé
        script: |
          ./gradlew assembleRelease --no-daemon

      - name: Générer AAB pour le Play Store
        script: |
          ./gradlew bundleRelease --no-daemon

    artifacts:
      - app/build/outputs/apk/release/*.apk
      - app/build/outputs/bundle/release/*.aab
      - app/build/reports/

    publishing:
      email:
        recipients:
          - dev@dyslexiread.com
          - release@dyslexiread.com
        notify:
          success: true
          failure: true

      # GCLOUD_SERVICE_ACCOUNT_CREDENTIALS : JSON du compte de service Google Play (secret Codemagic)
      google_play:
        credentials: $GCLOUD_SERVICE_ACCOUNT_CREDENTIALS
        track: internal
        submit_as_draft: false
        changes_not_sent_for_review: false

  # ── Build QA (branche main → Firebase App Distribution) ──────────────────
  # Pas de keystore : APK debug signé automatiquement
  android-qa:
    name: Android QA — Firebase Distribution
    max_build_duration: 45
    instance_type: mac_mini_m1

    environment:
      vars:
        PACKAGE_NAME: "com.dyslexiread.app"
        # Remplacer par votre Firebase App ID (console Firebase > Paramètres du projet)
        FIREBASE_APP_ID: "1:xxxxxxxxxxxx:android:xxxxxxxxxxxxxxxx"
        # FIREBASE_TOKEN : généré via `firebase login:ci` → variable secrète Codemagic
      java: 17

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: 'main'
          include: true

    scripts:
      - name: Set up local.properties
        script: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties

      - name: Tests unitaires
        script: |
          ./gradlew test --no-daemon

      - name: Assembler APK Debug
        script: |
          ./gradlew assembleDebug --no-daemon

      - name: Distribuer via Firebase App Distribution
        script: |
          npm install -g firebase-tools
          firebase appdistribution:distribute \
            app/build/outputs/apk/debug/app-debug.apk \
            --app "$FIREBASE_APP_ID" \
            --token "$FIREBASE_TOKEN" \
            --groups "qa-testers" \
            --release-notes "Build auto — main — $(date '+%Y-%m-%d %H:%M')"

    artifacts:
      - app/build/outputs/apk/debug/*.apk

    publishing:
      email:
        recipients:
          - qa@dyslexiread.com
        notify:
          success: true
          failure: true
